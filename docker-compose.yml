version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: jobtracker-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobtracker-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/jobtracker
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo-data:
